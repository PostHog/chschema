name: Publish

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  contents: read
  packages: write   # required to push to ghcr.io

jobs:
  publish:
    runs-on: depot-ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0   # git describe needs tag history

    - name: Version metadata
      id: ver
      run: |
        echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"
        echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

    - name: Set up QEMU (for arm64 cross-build)
      uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

    - name: Set up Buildx
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

    - name: Login to ghcr.io
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Image metadata (tags + labels)
      id: meta
      uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
      with:
        images: ghcr.io/posthog/chschema
        tags: |
          type=ref,event=branch
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Build and push (linux/amd64,linux/arm64)
      uses: docker/build-push-action@5176d81f87c23d6fc96624dfdbcd9f3830bbe445 # v6.5.0
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        build-args: |
          VERSION=${{ steps.ver.outputs.version }}
          COMMIT=${{ github.sha }}
          BUILD_TIME=${{ steps.ver.outputs.build_time }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ---- ops image (hclexp + sh + git + curl) ----
    # Separate image name with its own clean tag stream; published alongside
    # the distroless image above. Uses a distinct gha cache scope so the two
    # builds don't clobber each other's cache.
    - name: Ops image metadata (tags + labels)
      id: meta-ops
      uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
      with:
        images: ghcr.io/posthog/chschema-ops
        tags: |
          type=ref,event=branch
          type=sha,format=short,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}

    - name: Build and push ops (linux/amd64,linux/arm64)
      uses: docker/build-push-action@5176d81f87c23d6fc96624dfdbcd9f3830bbe445 # v6.5.0
      with:
        context: .
        target: ops
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta-ops.outputs.tags }}
        labels: ${{ steps.meta-ops.outputs.labels }}
        build-args: |
          VERSION=${{ steps.ver.outputs.version }}
          COMMIT=${{ github.sha }}
          BUILD_TIME=${{ steps.ver.outputs.build_time }}
        cache-from: type=gha,scope=ops
        cache-to: type=gha,mode=max,scope=ops
