name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted correctly:"
          gofmt -s -l .
          exit 1
        fi

  vet:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out ./internal/...

    - name: Run integration tests
      run: go test -v ./test/...

    - name: Check test coverage
      run: |
        go tool cover -func=coverage.out
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
        echo "Total test coverage: ${COVERAGE}%"

  test-live:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Start ClickHouse stack
      run: docker compose up -d --wait

    - name: Run live tests
      # ENABLE_CLICKHOUSE is the env-var default for the -clickhouse flag
      # in both test packages, avoiding the gotcha that custom test flags
      # must follow the package list.
      #
      # Skips MaterializedView/View/Dictionary subtests of
      # TestLive_Introspection_AllStatements because they depend on source
      # tables the test harness doesn't pre-create. Tracked in
      # docs/tasks/live-introspection-mv-view-dict.md.
      env:
        ENABLE_CLICKHOUSE: '1'
      run: |
        go test -v \
          -skip 'TestLive_Introspection_AllStatements/(MaterializedView|View|Dictionary)' \
          ./test/... ./internal/loader/hcl/...

    - name: Dump ClickHouse logs on failure
      if: failure()
      run: docker compose logs --no-color clickhouse keeper

    - name: Tear down ClickHouse stack
      if: always()
      run: docker compose down -v

  build:
    runs-on: ubuntu-latest
    needs: [lint, vet, test, test-live]
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version: '1.26'
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Build all packages
      run: go build ./...

    - name: Build hclexp binary
      run: go build -o hclexp ./cmd/hclexp

    - name: Smoke-test hclexp help
      run: ./hclexp -h

    - name: Smoke-test hclexp diff help
      run: ./hclexp diff -h

    - name: Smoke-test hclexp introspect help
      run: ./hclexp introspect -h

    - name: Smoke-test hclexp validate help
      run: ./hclexp validate -h