name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  actions: write

jobs:
  lint:
    runs-on: depot-ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run go fmt
      run: |
        if [ "$(gofmt -s -l . | wc -l)" -gt 0 ]; then
          echo "The following files are not formatted correctly:"
          gofmt -s -l .
          exit 1
        fi

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
      with:
        # v2.12.2's prebuilt binary is built with go1.26, so it type-checks this
        # module's go1.26 source. (Older v2.4.0 was built with go1.25 and
        # panicked: "file requires newer Go version go1.26".)
        version: v2.12.2

  vet:
    runs-on: depot-ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Verify dependencies
      run: go mod verify

    - name: Run go vet
      run: go vet ./...

  test:
    runs-on: depot-ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Run unit tests
      run: go test -v -race -coverprofile=coverage.out ./internal/... ./cmd/...

    - name: Run integration tests
      run: go test -v ./test/...

    - name: Check test coverage
      env:
        # Floor, not target: raise it as coverage grows, never lower it (#99).
        COVERAGE_FLOOR: "73"
      run: |
        go tool cover -func=coverage.out
        COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
        echo "Total test coverage: ${COVERAGE}% (floor: ${COVERAGE_FLOOR}%)"
        if awk -v c="$COVERAGE" -v f="$COVERAGE_FLOOR" 'BEGIN { exit !(c < f) }'; then
          echo "::error::Coverage ${COVERAGE}% is below the ${COVERAGE_FLOOR}% floor"
          exit 1
        fi

  test-live:
    runs-on: depot-ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Start ClickHouse stack
      run: docker compose up -d --wait

    - name: Run live tests
      # ENABLE_CLICKHOUSE is the env-var default for the -clickhouse flag
      # in both test packages, avoiding the gotcha that custom test flags
      # must follow the package list.
      env:
        ENABLE_CLICKHOUSE: '1'
      run: go test -v ./test/... ./internal/loader/hcl/...

    - name: Dump ClickHouse logs on failure
      if: failure()
      run: docker compose logs --no-color clickhouse keeper

    - name: Tear down ClickHouse stack
      if: always()
      run: docker compose down -v

  build:
    runs-on: depot-ubuntu-24.04
    needs: [lint, vet, test, test-live]
    steps:
    - name: Checkout code
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true
        cache-dependency-path: go.sum

    - name: Download dependencies
      run: go mod download

    - name: Build all packages
      run: go build ./...

    - name: Build hclexp binary
      run: go build -o hclexp ./cmd/hclexp

    - name: Smoke-test hclexp help
      run: ./hclexp -h

    - name: Smoke-test every subcommand's help
      run: |
        for cmd in introspect dump-cluster dump-sql diff plan validate drift sql2hcl load web github-token; do
          echo "== hclexp $cmd -h =="
          ./hclexp "$cmd" -h
        done
