    - name: group3_created_at
      type: DateTime64(3)
    - name: group4_created_at
      type: DateTime64(3)
    - name: person_mode
      type: Enum8('full' = 0, 'propertyless' = 1, 'force_upgrade' = 2)
    - comment: column_materializer::$group_0
      defaultExpression: replaceRegexpAll(JSONExtractRaw(properties, '$group_0'), '^"|"$', '')
      name: $group_0
      type: String
    - comment: column_materializer::$group_1
      defaultExpression: replaceRegexpAll(JSONExtractRaw(properties, '$group_1'), '^"|"$', '')
      name: $group_1
