    - defaultExpression: arrayDistinct(extractAll(elements_chain, '(?::|")attr_id="(.*?)"'))
      name: elements_chain_ids
      type: Array(String)
    - name: is_deleted
      type: Bool
    - defaultExpression: CAST(JSONExtractKeysAndValues(properties, 'String'), 'Map(String, String)')
