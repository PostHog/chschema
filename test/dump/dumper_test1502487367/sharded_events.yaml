      name: $window_id
      type: String
    - comment: column_materializer::$session_id
      defaultExpression: replaceRegexpAll(JSONExtractRaw(properties, '$session_id'), '^"|"$', '')
      name: $session_id
      type: String
    - defaultExpression: toUInt128(JSONExtract(properties, '$session_id', 'Nullable(UUID)'))
      name: $session_id_uuid
      type: Nullable(UInt128)
    - defaultExpression: extract(elements_chain, '(?::|")href="(.*?)"')
      name: elements_chain_href
      type: String
    - defaultExpression: arrayDistinct(extractAll(elements_chain, '(?::|")text="(.*?)"'))
      name: elements_chain_texts
      type: Array(String)
    - defaultExpression: arrayDistinct(extractAll(elements_chain, '(?:^|;)(a|button|form|input|select|textarea|label)(?:\\.|$|:)'))
      name: elements_chain_elements
      type: Array(Enum8('a' = 1, 'button' = 2, 'form' = 3, 'input' = 4, 'select' = 5, 'textarea' = 6, 'label' = 7))
    - codec: CODEC(ZSTD(1))
      defaultExpression: mapSort(mapFilter((key, _) -> ((key NOT LIKE '$%') AND (key NOT IN ('token', 'distinct_id', 'utm_source', 'utm_medium', 'utm_campaign', 'utm_content', 'utm_term', 'gclid', 'gad_source', 'gclsrc', 'dclid', 'gbraid', 'wbraid', 'fbclid', 'msclkid', 'twclid', 'li_fat_id', 'mc_cid', 'igshid', 'ttclid', 'rdt_cid', 'epik', 'qclid', 'sccid', 'irclid', '_kx'))), CAST(JSONExtractKeysAndValues(properties, 'String'), 'Map(String, String)')))
      name: properties_group_custom
      type: Map(String, String)
    - codec: CODEC(ZSTD(1))
      defaultExpression: mapSort(mapFilter((key, _) -> ((key LIKE '$ai_%') AND (key != '$ai_input') AND (key != '$ai_output_choices')), CAST(JSONExtractKeysAndValues(properties, 'String'), 'Map(String, String)')))
      name: properties_group_ai
      type: Map(String, String)
    - codec: CODEC(ZSTD(1))
      defaultExpression: mapSort(mapFilter((key, _) -> (key LIKE '$feature/%'), CAST(JSONExtractKeysAndValues(properties, 'String'), 'Map(String, String)')))
      name: properties_group_feature_flags
      type: Map(String, String)
    - codec: CODEC(ZSTD(1))
      defaultExpression: mapSort(mapFilter((key, _) -> (key NOT LIKE '$%'), CAST(JSONExtractKeysAndValues(person_properties, 'String'), 'Map(String, String)')))
      name: person_properties_map_custom
      type: Map(String, String)
    - name: _timestamp
      type: DateTime
    - name: _offset
      type: UInt64
    - defaultExpression: now64()
      name: inserted_at
      type: Nullable(DateTime64(6, 'UTC'))
    - name: consumer_breadcrumbs
