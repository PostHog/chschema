syntax = "proto3";

package clickhouse.iac.v1;

option go_package = "github.com/posthog/chschema/gen/chschema_v1;chschema_v1";

message Column {
  string name = 1;
  string type = 2;
  optional string default_expression = 3;
  optional string codec = 4;
  optional string ttl = 5;
  optional string comment = 6;
  // default_kind is the ClickHouse column default kind: DEFAULT,
  // MATERIALIZED, ALIAS or EPHEMERAL. Empty means a plain DEFAULT (or no
  // default expression at all).
  optional string default_kind = 7;
}
